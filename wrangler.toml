# Wrangler-Config fuer LOKALE Tests / CI (Improve-2) — NICHT fuer den Deploy.
# Der Produktions-Deploy laeuft ueber die Cloudflare-Pages-Git-Integration
# (Push auf main), die kein wrangler.toml braucht. Diese Datei existiert nur,
# damit `wrangler pages dev` die Functions (functions/) mit dem D1-Binding `DB`
# lokal gegen die echte workerd-Runtime fahren kann — das ergaenzt die
# node:sqlite-Shim-Tests (tests/api.test.js) um einen echten Runtime-Smoke.
name = "smart-home-dashboard"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# Lokale D1 (die Functions legen ihr Schema zur Laufzeit selbst an, CREATE TABLE
# IF NOT EXISTS) — database_id ist lokal beliebig.
[[d1_databases]]
binding = "DB"
database_name = "smarthub-local"
database_id = "00000000-0000-0000-0000-000000000000"
